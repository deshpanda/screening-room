<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Reel missing — The Screening Room</title>
<style>
  :root { --bg: #0e0c09; --ink: #d8d2c7; --faint: #7d766a; --amber: #e6a648; }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--ink); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    border-top: 6vh solid #000; border-bottom: 6vh solid #000;
  }
  main { text-align: center; padding: 2rem; }
  .code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: .8rem; letter-spacing: .35em; color: var(--faint); text-transform: uppercase; }
  h1 { font-size: clamp(2rem, 6vw, 3.4rem); font-weight: 800; letter-spacing: .02em; margin: .5rem 0 .8rem; text-transform: uppercase; }
  h1 em { font-style: normal; color: var(--amber); }
  p { color: var(--faint); font-size: .95rem; max-width: 34rem; margin: 0 auto 1.6rem; line-height: 1.6; }
  a { display: inline-block; color: var(--bg); background: var(--amber); text-decoration: none; font-weight: 700; font-size: .82rem; letter-spacing: .12em; text-transform: uppercase; padding: .7rem 1.4rem; border-radius: 3px; }
</style>
</head>
<body>
<main>
  <div class="code">404 · frame not found</div>
  <h1>This reel is <em>missing</em></h1>
  <p>Whatever was here never made the final cut — or the projectionist misfiled the canister. Either way, the print you asked for isn’t in this booth.</p>
  <a href="/screening-room/">Back to the booth</a>
</main>
</body>
</html>
